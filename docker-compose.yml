services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: policylense-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: policylense-frontend
    env_file:
      - ./frontend/.env.local
    ports:
      - "3000:3000"
    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy